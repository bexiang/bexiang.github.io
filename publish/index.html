<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习闪卡 - 主菜单</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .compact-list {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #2c3e50;
            padding-bottom: 10px;
            border-bottom: 2px solid #07C160;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .course-item:last-child {
            border-bottom: none;
        }
        
        .course-item:hover {
            background: #f9f9f9;
        }
        
        .course-date {
            font-weight: bold;
            color: #2193b0;
            font-size: 1.1rem;
        }
        
        .course-action {
            text-align: right;
        }
        
        .btn-compact {
            display: inline-block;
            padding: 8px 15px;
            background: #07C160;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }
        
        .btn-compact:hover {
            background: #05a75a;
        }
        
        .sort-controls {
            display: flex;
            gap: 10px;
        }
        
        .sort-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .sort-btn.active {
            background: #07C160;
            color: white;
            border-color: #07C160;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        @media (max-width: 600px) {
            .course-item {
                flex-direction: column;
                align-items: center;
                padding: 15px;
                text-align: center;
            }
            
            .course-date {
                margin-bottom: 10px;
            }
            
            .section-title {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            
            .sort-controls {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>英语学习闪卡</h1>
            <p>六年级上学期 - 主菜单</p>
        </div>
        
        <div class="compact-list">
            <div class="section-title">
                <span>所有课程 (2)</span>
                <div class="sort-controls">
                    <button class="sort-btn active" id="sort-newest">最新优先</button>
                    <button class="sort-btn" id="sort-oldest">最旧优先</button>
                </div>
            </div>
            
            <div id="courses-list">
                
            <div class="course-item">
                <div class="course-date">2026年3月3日</div>
                <div class="course-action">
                    <a href="flashcards_20260303.html" class="btn-compact">开始学习</a>
                </div>
            </div>
        
            <div class="course-item">
                <div class="course-date">2026年3月2日</div>
                <div class="course-action">
                    <a href="flashcards_20260302.html" class="btn-compact">开始学习</a>
                </div>
            </div>
        
            </div>
        </div>
        
        <div class="footer">
            <p>© 2025 英语学习闪卡 - 六年级上学期</p>
            <p>点击日期开始学习</p>
        </div>
    </div>

    <script>
        // 课程数据
        const courses = [
            {date: '2026-03-03', formattedDate: '2026年3月3日', filename: 'flashcards_20260303.html'},
            {date: '2026-03-02', formattedDate: '2026年3月2日', filename: 'flashcards_20260302.html'}
        ];

        // 渲染课程列表
        function renderCourses(sortOrder = 'newest') {
            const coursesList = document.getElementById('courses-list');
            coursesList.innerHTML = '';
            
            // 排序课程
            const sortedCourses = [...courses];
            if (sortOrder === 'newest') {
                sortedCourses.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else {
                sortedCourses.sort((a, b) => new Date(a.date) - new Date(b.date));
            }
            
            // 生成课程列表
            sortedCourses.forEach(course => {
                const courseItem = document.createElement('div');
                courseItem.className = 'course-item';
                
                courseItem.innerHTML = `
                    <div class="course-date">${course.formattedDate}</div>
                    <div class="course-action">
                        <a href="${course.filename}" class="btn-compact">开始学习</a>
                    </div>
                `;
                
                coursesList.appendChild(courseItem);
            });
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 初始渲染
            renderCourses('newest');
            
            // 排序按钮事件
            document.getElementById('sort-newest').addEventListener('click', function() {
                this.classList.add('active');
                document.getElementById('sort-oldest').classList.remove('active');
                renderCourses('newest');
            });
            
            document.getElementById('sort-oldest').addEventListener('click', function() {
                this.classList.add('active');
                document.getElementById('sort-newest').classList.remove('active');
                renderCourses('oldest');
            });
        });
    </script>
</body>
</html>
